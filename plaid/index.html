<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Return to FuelD</title>
    <style>
      :root {
        --ink: #141204;
        --mist: #f8fbef;
        --teal: #508991;
        --line: rgba(20, 18, 4, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top, rgba(80, 137, 145, 0.12), transparent 28%),
          linear-gradient(180deg, #ffffff 0%, var(--mist) 100%);
      }

      .panel {
        max-width: 560px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 40px rgba(20, 18, 4, 0.06);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
      }

      p {
        margin: 0;
        line-height: 1.65;
        color: rgba(20, 18, 4, 0.78);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Return to FuelD</h1>
      <p>
        If FuelD does not reopen automatically, switch back to the app to finish
        linking your institution.
      </p>
    </main>
  </body>
</html>
